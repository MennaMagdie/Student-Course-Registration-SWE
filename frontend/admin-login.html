<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - University Registration</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-container container">
    <h1>Admin Login</h1>

    <div id="messageBox"></div>

    <form id="adminLoginForm">
      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
      </div>

      <button type="submit">Admin Login</button>
    </form>

    <p style="margin-top: 20px; text-align: center; color: #666;">
      Demo - Use email: admin@university.edu, password: admin123
    </p>

    <p style="margin-top: 15px; text-align: center; color: #666;">
      <a href="login.html" style="color: #007bff; text-decoration: none;">Back to Student Login</a>
    </p>
  </div>

  <script src="script.js"></script>
  <script>
    // Handle admin login form submission
    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('http://localhost:3000/admin-login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          credentials: 'include',
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (data.success) {
          showMessage('Login successful! Redirecting...', 'success');
          localStorage.setItem('adminId', data.adminId);
          localStorage.setItem('adminName', data.name);
          localStorage.setItem('isAdmin', 'true');
          setTimeout(() => {
            window.location.href = 'admin.html';
          }, 1000);
        } else {
          showMessage(data.message, 'error');
        }
      } catch (error) {
        console.error(error);
        showMessage('Server error. Make sure backend is running.', 'error');
      }
    });

    function showMessage(msg, type) {
      const msgBox = document.getElementById('messageBox');
      msgBox.innerHTML = `<div class="message ${type}">${msg}</div>`;
    }
  </script>
</body>
</html>
