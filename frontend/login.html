<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>University Registration - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="brand-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
          </svg>
        </div>
        <span class="brand-name">UniPortal</span>
      </div>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your student account</p>

      <div id="messageBox"></div>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="student_id">Student ID</label>
          <input type="text" id="student_id" name="student_id" placeholder="e.g. STU-001" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn-primary btn-block">Sign In</button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a href="signup.html">Create one</a></p>
        <p>Administrator? <a href="admin-login.html">Admin login</a></p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const student_id = document.getElementById('student_id').value.trim();
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('http://localhost:3000/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ student_id, password })
        });

        const data = await response.json();

        if (data.success) {
          showMessage('Login successful! Redirecting...', 'success');
          localStorage.setItem('studentId', data.studentId);
          localStorage.setItem('studentName', data.name);
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 900);
        } else {
          showMessage(data.message, 'error');
        }
      } catch (error) {
        console.error(error);
        showMessage('Server error. Make sure backend is running.', 'error');
      }
    });
  </script>
</body>
</html>
