<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - University Registration</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">
      <div class="brand-icon brand-icon--sm brand-icon--admin">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <span class="brand-name">Admin Panel</span>
    </div>
    <div class="nav-links">
      <span class="nav-user" id="adminNameDisplay"></span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="page-container">
    <div id="messageBox"></div>

    <div class="page-header">
      <h1 class="page-title">Management Dashboard</h1>
      <p class="page-subtitle">Manage students, courses, and grades</p>
    </div>

    <div class="admin-grid">
      <!-- Add Student -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Add New Student</h2>
        </div>
        <form id="addStudentForm">
          <div class="form-row-2">
            <div class="form-group">
              <label for="studentUid">Student ID</label>
              <input type="text" id="studentUid" placeholder="e.g. STU-005" required>
            </div>
            <div class="form-group">
              <label for="studentName">Full Name</label>
              <input type="text" id="studentName" placeholder="Student's full name" required>
            </div>
          </div>
          <div class="form-row-2">
            <div class="form-group">
              <label for="studentEmail">Email</label>
              <input type="email" id="studentEmail" placeholder="student@university.edu" required>
            </div>
            <div class="form-group">
              <label for="studentPhone">Phone</label>
              <input type="text" id="studentPhone" placeholder="Phone number" required>
            </div>
          </div>
          <div class="form-group">
            <label for="studentAddress">Address</label>
            <input type="text" id="studentAddress" placeholder="City, Country" required>
          </div>
          <div class="form-group">
            <label for="studentPassword">Password</label>
            <input type="password" id="studentPassword" placeholder="Initial password" required>
          </div>
          <button type="submit" class="btn-primary">Add Student</button>
        </form>
      </div>

      <!-- Add Course -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Add New Course</h2>
        </div>
        <form id="addCourseForm">
          <div class="form-group">
            <label for="courseName">Course Name</label>
            <input type="text" id="courseName" placeholder="e.g. Database Systems" required>
          </div>
          <div class="form-group">
            <label for="courseInstructor">Instructor</label>
            <input type="text" id="courseInstructor" placeholder="Dr. Name" required>
          </div>
          <div class="form-group">
            <label for="lectureTime">Lecture Time</label>
            <input type="text" id="lectureTime" placeholder="e.g. Monday 10:00 AM" required>
          </div>
          <button type="submit" class="btn-primary">Add Course</button>
        </form>
      </div>

      <!-- Upload Grade -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Upload Grade</h2>
        </div>
        <form id="uploadGradeForm">
          <div class="form-row-2">
            <div class="form-group">
              <label for="gradeStudentId">Student DB ID</label>
              <input type="number" id="gradeStudentId" placeholder="Student numeric ID" required>
            </div>
            <div class="form-group">
              <label for="gradeCourseId">Course ID</label>
              <input type="number" id="gradeCourseId" placeholder="Course ID" required>
            </div>
          </div>
          <div class="form-row-2">
            <div class="form-group">
              <label for="grade">Grade</label>
              <input type="text" id="grade" placeholder="A, B, C, D, F" required>
            </div>
            <div class="form-group">
              <label for="examScore">Exam Score</label>
              <input type="number" id="examScore" min="0" max="100" placeholder="0–100" required>
            </div>
          </div>
          <button type="submit" class="btn-primary">Upload Grade</button>
        </form>
      </div>
    </div>

    <!-- Students Table -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">All Students</h2>
      </div>
      <div class="table-wrapper">
        <table id="studentTable">
          <thead>
            <tr>
              <th>Student ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- Courses Table -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">All Courses</h2>
      </div>
      <div class="table-wrapper">
        <table id="courseTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Course Name</th>
              <th>Instructor</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    window.addEventListener('load', async () => {
      const adminId = localStorage.getItem('adminId');
      const adminName = localStorage.getItem('adminName');
      const isAdmin = localStorage.getItem('isAdmin');

      if (!adminId || !isAdmin) {
        window.location.href = 'admin-login.html';
        return;
      }

      document.getElementById('adminNameDisplay').textContent = adminName;
      await loadStudents();
      await loadCourses();
    });

    document.getElementById('addStudentForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const student_id = document.getElementById('studentUid').value.trim();
      const name = document.getElementById('studentName').value;
      const email = document.getElementById('studentEmail').value;
      const phone = document.getElementById('studentPhone').value;
      const address = document.getElementById('studentAddress').value;
      const password = document.getElementById('studentPassword').value;

      try {
        const response = await fetch('http://localhost:3000/add-student', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ student_id, name, email, phone, address, password })
        });
        const data = await response.json();

        if (data.success) {
          showMessage('Student added successfully!', 'success');
          document.getElementById('addStudentForm').reset();
          await loadStudents();
        } else {
          showMessage(data.message, 'error');
        }
      } catch (error) {
        console.error(error);
        showMessage('Error adding student', 'error');
      }
    });

    document.getElementById('addCourseForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const course_name = document.getElementById('courseName').value;
      const instructor = document.getElementById('courseInstructor').value;
      const lecture_time = document.getElementById('lectureTime').value;

      try {
        const response = await fetch('http://localhost:3000/add-course', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ course_name, instructor, lecture_time })
        });
        const data = await response.json();

        if (data.success) {
          showMessage('Course added successfully!', 'success');
          document.getElementById('addCourseForm').reset();
          await loadCourses();
        } else {
          showMessage(data.message, 'error');
        }
      } catch (error) {
        console.error(error);
        showMessage('Error adding course', 'error');
      }
    });

    document.getElementById('uploadGradeForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const student_id = document.getElementById('gradeStudentId').value;
      const course_id = document.getElementById('gradeCourseId').value;
      const grade = document.getElementById('grade').value;
      const exam_score = document.getElementById('examScore').value;

      try {
        const response = await fetch('http://localhost:3000/upload-grade', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ student_id, course_id, grade, exam_score })
        });
        const data = await response.json();

        if (data.success) {
          showMessage('Grade uploaded successfully!', 'success');
          document.getElementById('uploadGradeForm').reset();
        } else {
          showMessage(data.message, 'error');
        }
      } catch (error) {
        console.error(error);
        showMessage('Error uploading grade', 'error');
      }
    });

    async function loadStudents() {
      try {
        const response = await fetch('http://localhost:3000/students');
        const data = await response.json();

        if (data.success) {
          const tbody = document.querySelector('#studentTable tbody');
          tbody.innerHTML = '';

          if (data.students.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="empty-row">No students found</td></tr>';
            return;
          }

          data.students.forEach(student => {
            const row = document.createElement('tr');
            row.innerHTML = `
              <td><span class="badge">${student.student_id}</span></td>
              <td>${student.name}</td>
              <td>${student.email}</td>
              <td class="actions">
                <button class="btn-delete" onclick="deleteStudent(${student.id})">Delete</button>
              </td>
            `;
            tbody.appendChild(row);
          });
        }
      } catch (error) {
        console.error(error);
      }
    }

    async function loadCourses() {
      try {
        const response = await fetch('http://localhost:3000/courses');
        const data = await response.json();

        if (data.success) {
          const tbody = document.querySelector('#courseTable tbody');
          tbody.innerHTML = '';

          data.courses.forEach(course => {
            const row = document.createElement('tr');
            row.innerHTML = `
              <td>${course.id}</td>
              <td>${course.course_name}</td>
              <td>${course.instructor}</td>
              <td class="actions">
                <button class="btn-delete" onclick="deleteCourse(${course.id})">Delete</button>
              </td>
            `;
            tbody.appendChild(row);
          });
        }
      } catch (error) {
        console.error(error);
      }
    }

    async function deleteStudent(id) {
      if (!confirm('Are you sure you want to delete this student?')) return;

      try {
        const response = await fetch(`http://localhost:3000/delete-student/${id}`, { method: 'DELETE' });
        const data = await response.json();

        if (data.success) {
          showMessage('Student deleted successfully!', 'success');
          await loadStudents();
        } else {
          showMessage(data.message, 'error');
        }
      } catch (error) {
        console.error(error);
        showMessage('Error deleting student', 'error');
      }
    }

    async function deleteCourse(courseId) {
      if (!confirm('Are you sure you want to delete this course?')) return;

      try {
        const response = await fetch(`http://localhost:3000/delete-course/${courseId}`, { method: 'DELETE' });
        const data = await response.json();

        if (data.success) {
          showMessage('Course deleted successfully!', 'success');
          await loadCourses();
        } else {
          showMessage(data.message, 'error');
        }
      } catch (error) {
        console.error(error);
        showMessage('Error deleting course', 'error');
      }
    }

    async function logout() {
      try {
        await fetch('http://localhost:3000/admin-logout', { method: 'POST', credentials: 'include' });
        localStorage.removeItem('adminId');
        localStorage.removeItem('adminName');
        localStorage.removeItem('isAdmin');
        window.location.href = 'admin-login.html';
      } catch (error) {
        console.error(error);
      }
    }
  </script>
</body>
</html>
