<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - University Registration</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <div class="auth-wrapper">
    <div class="auth-card auth-card--wide">
      <div class="auth-brand">
        <div class="brand-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
          </svg>
        </div>
        <span class="brand-name">UniPortal</span>
      </div>

      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Join the student portal</p>

      <div id="messageBox"></div>

      <form id="signupForm" class="auth-form">
        <div class="form-row-2">
          <div class="form-group">
            <label for="student_id">Student ID</label>
            <input type="text" id="student_id" name="student_id" placeholder="e.g. STU-005" required>
          </div>
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Your full name" required>
          </div>
        </div>

        <div class="form-row-2">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@university.edu" required>
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="text" id="phone" name="phone" placeholder="e.g. 0501234567" required>
          </div>
        </div>

        <div class="form-group">
          <label for="address">Address</label>
          <input type="text" id="address" name="address" placeholder="City, Country" required>
        </div>

        <div class="form-row-2">
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="At least 4 characters" required>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat password" required>
          </div>
        </div>

        <button type="submit" class="btn-primary btn-block">Create Account</button>
      </form>

      <div class="auth-footer">
        <p>Already have an account? <a href="login.html">Sign in</a></p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const student_id = document.getElementById('student_id').value.trim();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const address = document.getElementById('address').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        showMessage('Passwords do not match!', 'error');
        return;
      }
      if (password.length < 4) {
        showMessage('Password must be at least 4 characters long!', 'error');
        return;
      }

      try {
        const response = await fetch('http://localhost:3000/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ student_id, name, email, phone, address, password })
        });

        const data = await response.json();

        if (data.success) {
          showMessage('Account created successfully! Redirecting to login...', 'success');
          setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        } else {
          showMessage(data.message, 'error');
        }
      } catch (error) {
        console.error(error);
        showMessage('Server error. Make sure backend is running.', 'error');
      }
    });
  </script>
</body>
</html>
