<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - University Registration</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-container container">
    <h1>Create Student Account</h1>

    <div id="messageBox"></div>

    <form id="signupForm">
      <div class="form-group">
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" required>
      </div>

      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number:</label>
        <input type="text" id="phone" name="phone" required>
      </div>

      <div class="form-group">
        <label for="address">Address:</label>
        <input type="text" id="address" name="address" required>
      </div>

      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password:</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required>
      </div>

      <button type="submit">Sign Up</button>
    </form>

    <p style="margin-top: 20px; text-align: center; color: #666;">
      Already have an account? <a href="login.html" style="color: #007bff; text-decoration: none;">Login here</a>
    </p>
  </div>

  <script src="script.js"></script>
  <script>
    // Handle signup form submission
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const address = document.getElementById('address').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Validate passwords match
      if (password !== confirmPassword) {
        showMessage('Passwords do not match!', 'error');
        return;
      }

      // Validate password length
      if (password.length < 4) {
        showMessage('Password must be at least 4 characters long!', 'error');
        return;
      }

      try {
        const response = await fetch('http://localhost:3000/signup', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ name, email, phone, address, password })
        });

        const data = await response.json();

        if (data.success) {
          showMessage('Account created successfully! Redirecting to login...', 'success');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          showMessage(data.message, 'error');
        }
      } catch (error) {
        console.error(error);
        showMessage('Server error. Make sure backend is running.', 'error');
      }
    });

    function showMessage(msg, type) {
      const msgBox = document.getElementById('messageBox');
      msgBox.innerHTML = `<div class="message ${type}">${msg}</div>`;
    }
  </script>
</body>
</html>
