<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Courses - University Registration</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">
      <div class="brand-icon brand-icon--sm">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
        </svg>
      </div>
      <span class="brand-name">UniPortal</span>
    </div>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="page-container">
    <div id="messageBox"></div>

    <div class="page-header">
      <h1 class="page-title">Course Registration</h1>
      <p class="page-subtitle">Browse and register for available courses</p>
    </div>

    <div class="card">
      <div class="card-header">
        <h2 class="card-title">Available Courses</h2>
      </div>
      <div class="table-wrapper">
        <table id="coursesTable">
          <thead>
            <tr>
              <th>Course Name</th>
              <th>Instructor</th>
              <th>Lecture Time</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    window.addEventListener('load', async () => {
      const studentId = localStorage.getItem('studentId');
      if (!studentId) {
        window.location.href = 'login.html';
        return;
      }
      await loadCourses(studentId);
    });

    async function loadCourses(studentId) {
      try {
        const response = await fetch('http://localhost:3000/courses');
        const data = await response.json();

        if (data.success) {
          const tbody = document.querySelector('#coursesTable tbody');
          tbody.innerHTML = '';

          if (data.courses.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="empty-row">No courses available</td></tr>';
            return;
          }

          data.courses.forEach(course => {
            const row = document.createElement('tr');
            row.innerHTML = `
              <td>${course.course_name}</td>
              <td>${course.instructor}</td>
              <td>${course.lecture_time}</td>
              <td class="actions">
                <button class="btn-register" onclick="registerCourse(${studentId}, ${course.id})">Enroll</button>
              </td>
            `;
            tbody.appendChild(row);
          });
        }
      } catch (error) {
        console.error(error);
        showMessage('Error loading courses', 'error');
      }
    }

    async function registerCourse(studentId, courseId) {
      try {
        const response = await fetch('http://localhost:3000/register-course', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ student_id: studentId, course_id: courseId })
        });

        const data = await response.json();

        if (data.success) {
          showMessage('Enrolled successfully!', 'success');
          await loadCourses(studentId);
        } else {
          showMessage(data.message, 'error');
        }
      } catch (error) {
        console.error(error);
        showMessage('Error registering course', 'error');
      }
    }

    async function logout() {
      try {
        await fetch('http://localhost:3000/logout', { method: 'POST', credentials: 'include' });
        localStorage.removeItem('studentId');
        localStorage.removeItem('studentName');
        window.location.href = 'login.html';
      } catch (error) {
        console.error(error);
      }
    }
  </script>
</body>
</html>
